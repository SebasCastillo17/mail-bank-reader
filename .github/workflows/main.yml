name: Procesar gastos diario

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      MAIL: ${{ secrets.MAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
      JSON_PATH: credentials.json
      # Nota: GitHub está forzando Node.js 24 para acciones JavaScript en runners.
      # La advertencia sobre Node 20 se debe a que algunas acciones declaran
      # compatibilidad con Node 20 en su metadata. Para eliminar la advertencia
      # actualice las referencias de acciones a versiones que apunten a Node 24.

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear archivo de credenciales de Google
        run: |
          echo '${{ secrets.JSON }}' > credentials.json

      - name: Ejecutar script
        run: |
          python loader.py
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONTRACEMALLOC: "1"